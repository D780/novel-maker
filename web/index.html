<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovelMaker - 全能网文写作助手</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="navbar-brand">
            <span class="logo">NovelMaker</span>
            <span class="logo-sub">Novel · Maker</span>
        </div>
        <div class="nav-links">
            <a href="#" class="active" data-view="overview">概览</a>
            <a href="#" data-view="chapters">章节</a>
            <a href="#" data-view="characters">角色</a>
            <a href="#" data-view="pacing">节奏</a>
            <a href="#" data-view="editor">编辑器</a>
        </div>
        <div class="nav-right">
            <span class="nav-badge">v2.2</span>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">

        <!-- 项目概览 -->
        <section id="overview" class="view active">
            <div class="hero">
                <div class="hero-left">
                    <div class="hero-label">// 2026 · Open Source</div>
                    <h1>Just<br><em>write</em> it.</h1>
                    <div class="hero-sub">6 Agent · 智能协作 · 群聊式创作</div>
                </div>
                <div class="hero-right">
                    <p class="hero-desc">说出你的故事，<br>智能体团队即时接手，实时参与协作过程。</p>
                    <div class="btn-group">
                        <button class="btn btn-dark">
                            开始写作
                            <span class="badge badge-new">NEW</span>
                        </button>
                        <button class="btn">
                            导入项目
                        </button>
                    </div>
                </div>
            </div>

            <div class="section-label">项目数据</div>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>总章节数</h3>
                    <p id="total-chapters">0</p>
                </div>
                <div class="stat-card">
                    <h3>总字数</h3>
                    <p id="total-words">0</p>
                </div>
                <div class="stat-card">
                    <h3>当前进度</h3>
                    <p id="progress">0%</p>
                </div>
            </div>
        </section>

        <!-- 章节列表 -->
        <section id="chapters" class="view">
            <div class="section-label">FILE 01</div>
            <h2 class="section-title">章节列表</h2>
            <ul class="chapter-list" id="chapter-list"></ul>
        </section>

        <!-- 角色档案 -->
        <section id="characters" class="view">
            <div class="section-label">SQUAD</div>
            <h2 class="section-title">角色档案</h2>
            <div id="character-list" class="character-grid"></div>
        </section>

        <!-- 节奏可视化 -->
        <section id="pacing" class="view">
            <div class="section-label">LIVE PREVIEW</div>
            <h2 class="section-title">节奏可视化</h2>
            <div class="pacing-chart">
                <div id="pacing-chart-container" class="chart-container"></div>
            </div>
            <div id="emotion-stats" style="margin-top: 24px;"></div>
        </section>

        <!-- 编辑器 -->
        <section id="editor" class="view">
            <div class="section-label">EDITOR</div>
            <h2 class="section-title">编辑器</h2>
            <div class="editor-container">
                <textarea id="editor-content" placeholder="在这里输入 Markdown 内容..."></textarea>
                <div id="editor-preview"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        // 2026 · NovelMaker · 全能网文写作助手
    </footer>

    <script src="js/reader.js"></script>
    <script src="js/markdown.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
